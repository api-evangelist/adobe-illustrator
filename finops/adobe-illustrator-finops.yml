specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Adobe Illustrator
providerId: adobe-illustrator
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Illustration
  - Generative AI
notes: >-
  Illustrator is per-seat SaaS (Single App or All Apps) plus optional
  generative-credit usage for Firefly vector APIs. Public list prices
  were not retrievable via WebFetch.
description: >-
  FOCUS-aligned FinOps shape for Adobe Illustrator: per-seat Creative
  Cloud subscription (Single App or All Apps) plus generative-credit
  metering for Firefly Vector / Pattern / Recolor APIs.
sources:
  - https://www.adobe.com/products/illustrator/plans.html
  - https://developer.adobe.com/firefly-services/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Adobe Inc.
serviceCategory: Creative SaaS
billingModel:
  pricingCategory: Subscription + Generative Credits
  billingFrequency: Monthly / Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Refund
focusColumns:
  ServiceName: Adobe Illustrator
  ServiceCategory: Creative SaaS
  ProviderName: Adobe
  PublisherName: Adobe Inc.
  InvoiceIssuerName: Adobe Inc.
  BillingCurrency: USD
meters:
  - name: illustrator_seat
    description: Per-seat Illustrator subscription (Single App or All Apps)
    unit: seat-month
    aggregation: sum
    dimensions:
      - sku
      - geography
  - name: vector_generative_credits
    description: Firefly Vector / Pattern / Recolor API generative-credit consumption
    unit: credit
    aggregation: sum
    dimensions:
      - api
      - account
principles:
  - name: Visibility
    description: >-
      Use the Adobe Admin Console for seat usage; Firefly Services dashboard
      for generative-credit burn against Vector API.
  - name: Allocation
    description: >-
      Tag seats with department metadata in the Admin Console; attribute
      Vector API calls to consuming team via API key per integration.
  - name: Optimization
    description: >-
      Move occasional users from Single App to a shared All Apps seat where
      they need other tools; cache vector outputs server-side; route bulk
      pattern generation through Firefly Services bundles instead of
      ad-hoc API calls.
  - name: Accountability
    description: >-
      Design-team owner accountable for active seat count; engineering
      owner accountable for Vector API generative-credit burn rate.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
