specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Adobe Illustrator
providerId: adobe-illustrator
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Illustration
  - Vector Graphics
  - Design
  - Creative Cloud
notes: >-
  Adobe Illustrator is sold either as a Single App Creative Cloud
  subscription or as part of Creative Cloud All Apps. There is also a
  Firefly Services Vector / Illustrator API surface (server-side text-to-
  vector and pattern generation) priced via generative credits. Public list
  prices were not retrievable via WebFetch and are deferred to adobe.com.
description: >-
  Adobe Illustrator is a vector-graphics design app sold as a Creative
  Cloud subscription. The "API" surface for Illustrator is two-fold:
  (1) the Adobe ExtendScript / UXP scripting environment for desktop
  automation, and (2) Firefly Services vector / pattern generation
  endpoints for server-side use cases.
sources:
  - https://www.adobe.com/products/illustrator/plans.html
  - https://developer.adobe.com/firefly-services/docs/firefly-api/
plans:
  - id: adobe-illustrator-single-app
    name: Illustrator Single App
    type: subscription
    description: >-
      Per-seat monthly or annual subscription to Illustrator desktop +
      iPad app, including 100GB cloud storage.
    entries:
      - label: Illustrator seat (Single App)
        name: illustrator_single_app
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.adobe.com/products/illustrator/plans.html
        userMultiplied: true
    elements:
      - name: Illustrator desktop
      - name: Illustrator on iPad
      - name: 100GB cloud storage
      - name: Adobe Fonts
      - name: Generative credits (limited)
  - id: adobe-illustrator-all-apps
    name: Creative Cloud All Apps (includes Illustrator)
    type: subscription
    description: >-
      Bundled access to the full Creative Cloud suite including Illustrator.
    entries:
      - label: All Apps seat
        name: all_apps_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.adobe.com/creativecloud/plans.html
        userMultiplied: true
    elements:
      - name: All Creative Cloud apps
      - name: 100GB cloud storage
      - name: Adobe Fonts
      - name: Generative credits
  - id: adobe-illustrator-firefly-vector-api
    name: Firefly Services Vector API
    type: usage-based
    description: >-
      Server-side text-to-vector and pattern generation API priced via
      generative credits. Available in Firefly Services subscription
      bundles.
    entries:
      - label: Generative credit (Vector API)
        name: vector_api_credit
        type: metered
        metric: credit
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://developer.adobe.com/firefly-services/
        userMultiplied: false
    elements:
      - name: Text-to-vector API
      - name: Pattern generation API
      - name: Recolor vector API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
