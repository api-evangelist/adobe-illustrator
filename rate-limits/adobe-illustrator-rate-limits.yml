specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Adobe Illustrator
providerId: adobe-illustrator
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Illustration
  - Generative AI
notes: >-
  Illustrator desktop has no public REST API (scripting is local via
  ExtendScript / UXP). Rate limits apply only to the Firefly Services
  Vector / Pattern / Recolor APIs. Numeric per-second / per-minute
  ceilings are not published on the public docs and vary per endpoint.
description: >-
  Server-side rate limits for Illustrator-related APIs apply to the
  Firefly Services Vector, Pattern, and Recolor endpoints. Limits are
  governed by per-account concurrency caps and the available generative-
  credit balance; sustained excess returns 429.
sources:
  - https://developer.adobe.com/firefly-services/docs/firefly-api/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Firefly Vector API
    scope: account
    metric: requests_per_minute
    limit: see https://developer.adobe.com/firefly-services/docs/
    notes: >-
      Per-account throttling on the text-to-vector endpoint; concurrent
      generation slots vary per Firefly Services plan.
  - name: Firefly Pattern API
    scope: account
    metric: requests_per_minute
    limit: see https://developer.adobe.com/firefly-services/docs/
    notes: Per-account throttling on the pattern-generation endpoint.
  - name: Firefly Recolor Vector API
    scope: account
    metric: requests_per_minute
    limit: see https://developer.adobe.com/firefly-services/docs/
policies:
  - name: Backoff Strategy
    description: Exponential backoff with jitter; honor Retry-After when present.
  - name: Generative-credit pacing
    description: >-
      Calls decrement the generative-credit balance; depleted balance
      returns a billing-state error rather than a 429.
  - name: Concurrency caps
    description: >-
      Each Firefly endpoint has a concurrent-request cap per account;
      exceeding it returns 429 with Retry-After.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
